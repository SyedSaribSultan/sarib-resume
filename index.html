    <!-- Structured data: lets search engines and AI crawlers read who this is,
         the current role/employer, and verified social profiles. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Syed Sarib Sultan",
        "alternateName": "Sarib",
        "url": "https://sarib-resume.vercel.app",
        "image": "https://sarib-resume.vercel.app/og.png",
        "jobTitle": "Product Designer",
        "description": "Product Designer focused on end-to-end product design and growth across consumer AI products at ImagineArt and Chatly.",
        "worksFor": { "@type": "Organization", "name": "Vyro", "url": "https://imagine.art" },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Islamabad",
          "addressCountry": "PK"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "National University of Sciences and Technology (NUST)"
        },
        "knowsAbout": [
          "Product Design",
          "UX Design",
          "Design Systems",
          "Growth Design",
          "AI Product Design",
          "Conversion Optimization"
        ],
        "email": "mailto:sadakhan2002@gmail.com",
        "sameAs": ["https://linkedin.com/in/syedsaribsultanyac270"]
      }
    </script>

    <!-- Pre-paint theme: set the page background before React mounts so dark-mode
         users don't see a light flash (FOUC). Mirrors App.tsx palette + storage key. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme-mode');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.style.backgroundColor = dark ? '#121211' : '#fbfbfa';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
